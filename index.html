<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NexHire AI — Smart ATS Platform with AI-powered resume scanning, skill-first evaluation, and Google authentication." />
    <title>NexHire AI — Smart ATS Platform</title>
    
    <!-- Google OAuth Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- PDF.js for Resume PDF Scanning in Browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
      // Automatically set the worker path for PDF.js
      window.pdfjsLib = window['pdfjs-dist/build/pdf'];
      if(window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
      }
    </script>

    <!-- Mammoth.js for Word (.docx) Parsing in Browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
